<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Poddars Invest - live</title>
<style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
background:#0B0F14;color:#fff;font-family:Inter,system-ui,sans-serif;text-align:center}
.c{max-width:440px;padding:30px}h1{font-size:19px;margin:0 0 6px}
p{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6;margin:6px 0}
a.b{display:inline-block;margin-top:14px;background:linear-gradient(135deg,#4F8CFF,#7C6BFF);
color:#fff;text-decoration:none;font-weight:700;font-size:14px;border-radius:12px;padding:13px 26px}
.hint{color:#FFC857}.sp{margin-top:16px;width:22px;height:22px;border:3px solid rgba(255,255,255,.2);
border-top-color:#4F8CFF;border-radius:50%;display:inline-block;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="c">
<h1>Opening your live dashboard&hellip;</h1>
<p id="st">Finding the current server&hellip;</p><div class="sp"></div>
<p id="hint" class="hint"></p>
<p><a class="b" id="go" style="display:none">Open live dashboard</a></p>
<script>
var HINT="";
if(HINT){document.getElementById('hint').textContent=HINT;}
function go(u){var a=document.getElementById('go');a.href=u;a.style.display='inline-block';
document.getElementById('st').textContent='Redirecting to your dashboard\u2026';
location.replace(u);}
function tryOnce(){
  fetch('live.json?t='+Date.now(),{cache:'no-store'})
    .then(function(r){return r.json()})
    .then(function(d){ if(d&&d.url){go(d.url);} else{fail();} })
    .catch(fail);
}
function fail(){
  document.getElementById('st').textContent=
    'Could not reach the server list. The home PC may be rebuilding the tunnel - retrying\u2026';
  setTimeout(tryOnce,4000);
}
tryOnce();
</script>
</div></body></html>
